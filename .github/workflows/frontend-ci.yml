name: Frontend CI

# Lint + production build on every push/PR that touches frontend code.
# No tests yet — add a `jest` or `vitest` step here when test harness
# lands.
on:
  push:
    branches: [main, saas-migration]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, saas-migration]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm ci` requires a lockfile; fall back to `npm install` if
        # the repo is still committing package.json only.
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Build
        # Build-time placeholders — the real values come from Vercel
        # env secrets on deploy. CI only cares that the build succeeds
        # with *any* shape of these vars.
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.invalid
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: placeholder
          NEXT_PUBLIC_COGNITO_CLIENT_ID: placeholder
          NEXT_PUBLIC_AWS_REGION: ap-south-1
        run: npm run build
