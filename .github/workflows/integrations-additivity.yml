name: Integrations Additivity Gates

# Dedicated CI surface for the integration platform's additivity contract.
# Lives in its own workflow (rather than as a step inside backend-ci.yml)
# so a violation shows up in the PR as a single, explicit check named
# "additivity-gates" — easier to read at a glance, easier to require as
# a branch-protection rule.
#
# What this enforces, on every PR:
#
#   1. No file under any of the 12 existing bounded contexts may import
#      from `contexts.integrations`. The integration platform depends on
#      others; nothing else may depend on it.
#      (test_no_inbound_imports.test_no_existing_context_imports_from_integrations)
#
#   2. No file in the integrations *platform* code may import from a
#      specific connector — only `bootstrap.py` may, via the registry.
#      (test_no_inbound_imports.test_platform_does_not_import_specific_connector)
#
#   3. The shared_kernel emitter swallows every realistic failure mode
#      (KMS down, SQS down, malformed payload, etc.) without raising.
#      Existing task / project / comment write paths must keep working
#      even when the integration platform is broken.
#      (test_emitter_swallows_all_errors.*)
#
#   4. Every connector registered with the default registry satisfies
#      the Connector Protocol surface. A half-implemented connector
#      fails this gate before deploy.
#      (test_connector_protocol_compliance.*)
#
#   5. Provider namespacing in DynamoDB SK keys keeps two integrations
#      from the same tenant under different providers from reading or
#      affecting each other's ExternalLink rows.
#      (test_provider_namespace_isolation.*)
#
# Anything beyond these 5 belongs in the regular backend-ci pytest run.

on:
  push:
    branches: [main, saas-migration]
    paths:
      - 'backend/src/contexts/integrations/**'
      - 'backend/src/shared_kernel/integration_emitter.py'
      - 'backend/src/shared_kernel/tenant_keys.py'
      - 'backend/tests/integrations/**'
      - '.github/workflows/integrations-additivity.yml'
  pull_request:
    branches: [main, saas-migration]
    paths:
      - 'backend/**'
      - '.github/workflows/integrations-additivity.yml'

concurrency:
  group: integrations-additivity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  additivity-gates:
    name: additivity-gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration platform additivity tests
        # Fail-fast (-x) and short tracebacks because these tests should
        # never be flaky — any failure is a contract violation that must
        # block the PR.
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_SESSION_TOKEN: testing
          TABLE_NAME: TaskManagementTable-test
        run: |
          pytest -x --tb=short \
            tests/integrations/test_no_inbound_imports.py \
            tests/integrations/test_emitter_swallows_all_errors.py \
            tests/integrations/test_connector_protocol_compliance.py \
            tests/integrations/test_provider_namespace_isolation.py
